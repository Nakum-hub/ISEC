name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'

# Least-privilege by default; jobs opt into more where needed.
permissions:
  contents: read

# Cancel older runs of this workflow on the same ref when a new one starts.
concurrency:
  group: security-audit-$ github.ref 
  cancel-in-progress: true

jobs:
  python-audit:
    name: Python Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --strict
        # Fails CI if any known vulnerability is found

  npm-audit:
    name: npm Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies (no scripts)
        run: cd ui && npm install --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Audit npm dependencies
        run: cd ui && npm audit --audit-level=high
        # Fails CI if high or critical vulnerabilities found

  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-python"
