# Move this file to .github/workflows/test-os.yml to enable it.
#
# Cross-platform test workflow: runs the test + coverage suite on Linux,
# macOS, and Windows. Uses three explicit jobs (instead of a strategy matrix)
# so the file contains no template expressions and is easy to read.

name: Cross-Platform Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        shell: bash
        run: |
          python -m pytest -q 2>&1 | tee pytest-output.txt
          exit "${PIPESTATUS[0]}"
      - name: Annotate failures
        if: failure()
        shell: bash
        run: |
          # Surface each failing test as a workflow annotation so failures
          # are diagnosable straight from the Checks API.
          grep -E "^(FAILED|ERROR) " pytest-output.txt | head -10 | while IFS= read -r line; do
            echo "::error::${line}"
          done
          tail -n 60 pytest-output.txt
      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-windows
          path: pytest-output.txt
