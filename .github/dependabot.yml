version: 2
updates:
  # npm — monitor but do NOT auto-create branches/PRs
  # We handle all dependency updates manually in the main branch
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0    # ← Disables auto-branch creation
    labels:
      - "security"
      - "dependencies"

  # Python — monitor but do NOT auto-create branches/PRs
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0    # ← Disables auto-branch creation
    labels:
      - "security"
      - "dependencies"
