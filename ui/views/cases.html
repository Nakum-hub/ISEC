<section id="cases" class="view">
  <div class="section-header scan-header mb-20">
    <div>
      <div class="section-title">Case Management</div>
      <div style="font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);margin-top:4px;letter-spacing:0.12em;text-transform:uppercase;">Forensic Investigation Lifecycle</div>
    </div>
    <div class="section-actions">
      <button class="btn btn-secondary" id="cases-filter-all"   onclick="filterCases('all',this)">All</button>
      <button class="btn btn-secondary" id="cases-filter-open"  onclick="filterCases('OPEN',this)">Open</button>
      <button class="btn btn-secondary" id="cases-filter-active" onclick="filterCases('ACTIVE',this)">Active</button>
      <button class="btn btn-secondary" id="cases-filter-closed" onclick="filterCases('CLOSED',this)">Closed</button>
      <button class="btn btn-primary"   id="new-case-btn" onclick="openNewCaseModal()">+ New Case</button>
    </div>
  </div>

  <!-- Stats Row -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
    <div class="glassmorphism" style="padding:16px;"><div style="font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Total Cases</div><div id="cases-stat-total" style="font-family:var(--font-mono);font-size:1.8rem;font-weight:700;color:var(--cyan-bright);">0</div></div>
    <div class="glassmorphism" style="padding:16px;"><div style="font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Active</div><div id="cases-stat-active" style="font-family:var(--font-mono);font-size:1.8rem;font-weight:700;color:var(--success);">0</div></div>
    <div class="glassmorphism" style="padding:16px;"><div style="font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Closed</div><div id="cases-stat-closed" style="font-family:var(--font-mono);font-size:1.8rem;font-weight:700;color:var(--text-muted);">0</div></div>
    <div class="glassmorphism" style="padding:16px;"><div style="font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Evidence Linked</div><div id="cases-stat-evidence" style="font-family:var(--font-mono);font-size:1.8rem;font-weight:700;color:var(--purple);">0</div></div>
  </div>

  <!-- Cases Grid -->
  <div id="cases-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;"></div>
  <div id="cases-empty" class="empty-state hidden"><div class="empty-state-icon">🗂</div><span>No cases yet. Create your first investigation case.</span><button class="btn btn-primary" onclick="openNewCaseModal()" style="margin-top:12px;">+ New Case</button></div>
</section>
