<section id="timeline" class="view">
    <div class="timeline-header">
        <h1>Evidence Timeline</h1>
        <div class="timeline-filters">
            <select id="timeline-filter">
                <option value="all">All Evidence</option>
                <option value="system_logs">System Logs</option>
                <option value="browser_history">Browser History</option>
                <option value="network_connections">Network Connections</option>
                <option value="file_metadata">File Metadata</option>
            </select>
        </div>
    </div>

    <div class="timeline-container">
        <div class="timeline-line"></div>
        <div id="timeline-items">
            <!-- Timeline items will be populated dynamically -->
        </div>
    </div>
</section>
